<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PCB Red Flag Scanner</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚩</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #030a0a;
      --surface: rgba(0,255,180,.02);
      --surface2: rgba(0,255,180,.05);
      --border: rgba(0,255,180,.1);
      --border-bright: rgba(0,255,180,.35);
      --text: #c8ffe8;
      --muted: #2a5a4a;
      --muted2: #4a9a7a;
      --accent: #00ffb0;
      --accent2: #00c8ff;
      --warn: #ff9f0a;
      --red: #ff3b30;
      --glow: 0 0 12px rgba(0,255,180,.2);
      --glow-strong: 0 0 24px rgba(0,255,180,.35);
      --radius: 1px;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Space Mono', 'Courier New', monospace; min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.18) 2px, rgba(0,0,0,.18) 4px);
    }
    #oscCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .18; }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 90% 90% at 50% 50%, transparent 60%, rgba(0,0,0,.7) 100%);
    }
    .page { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 0 1.4rem 5rem; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 1.8rem 0 2rem; border-bottom: 1px solid var(--border); margin-bottom: 3rem; }
    .nav-left { display: flex; align-items: center; gap: 1.2rem; }
    .nav-logo { font-size: .75rem; font-weight: 700; letter-spacing: .25em; text-transform: uppercase; color: var(--accent); text-shadow: var(--glow); }
    .nav-logo span { color: var(--red); text-shadow: 0 0 12px rgba(255,59,48,.4); }
    .nav-badge { font-size: .62rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted2); border: 1px solid var(--border); padding: .25rem .7rem; border-radius: var(--radius); }
    .lang-toggle { display: flex; gap: 2px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 2px; }
    .lang-btn { background: none; border: none; cursor: pointer; font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: .08em; text-transform: uppercase; color: var(--muted2); padding: .3rem .6rem; border-radius: var(--radius); transition: all .2s; }
    .lang-btn.active { background: var(--accent); color: #000; font-weight: 700; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor { display: inline-block; width: 9px; height: 1.1em; background: var(--accent); margin-left: 3px; vertical-align: text-bottom; animation: blink 1.1s step-end infinite; }

    .hero { margin-bottom: 2.5rem; }
    .hero-eyebrow { font-size: .65rem; letter-spacing: .22em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; display: flex; align-items: center; gap: .6rem; text-shadow: var(--glow); }
    .hero-eyebrow::before { content: ''; display: inline-block; width: 24px; height: 1px; background: var(--accent); box-shadow: var(--glow); }
    h1 { font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 700; line-height: 1.1; letter-spacing: -.02em; margin-bottom: 1rem; }
    h1 em { font-style: normal; color: var(--red); text-shadow: 0 0 14px rgba(255,59,48,.5); }
    .hero-sub { font-size: .75rem; color: var(--muted2); line-height: 1.8; max-width: 500px; }

    .upload-zone { border: 1px dashed var(--border); padding: 2rem; text-align: center; margin-bottom: 1rem; transition: all .2s; cursor: pointer; border-radius: var(--radius); }
    .upload-zone:hover { border-color: var(--border-bright); background: var(--surface2); box-shadow: var(--glow); }
    .upload-zone.dragover { border-color: var(--accent); background: rgba(0,255,180,.04); box-shadow: var(--glow-strong); }
    .upload-icon { font-size: 2rem; margin-bottom: .6rem; filter: drop-shadow(0 0 8px rgba(0,255,180,.5)); }
    .upload-label { font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-bottom: .3rem; text-shadow: var(--glow); }
    .upload-sub { font-size: .65rem; color: var(--muted2); }
    #uploadInput { display: none; }

    .preview-zone { display: none; margin-bottom: 1rem; }
    .preview-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .6rem; }
    .preview-title { font-size: .62rem; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); text-shadow: var(--glow); }
    .preview-btn { background: none; border: 1px solid var(--border); color: var(--muted2); font-size: .65rem; padding: .25rem .5rem; cursor: pointer; border-radius: var(--radius); transition: all .2s; font-family: inherit; }
    .preview-btn:hover { border-color: var(--border-bright); color: var(--text); }
    .preview-img { max-width: 100%; border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--glow); }

    .field { margin-bottom: 1rem; }
    .field-label { font-size: .6rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted2); margin-bottom: .4rem; display: block; }
    .field-prefix { color: var(--accent); font-size: .68rem; margin-bottom: .3rem; text-shadow: var(--glow); }

    textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: 'Space Mono', monospace; font-size: .78rem;
      line-height: 1.7; padding: .7rem .9rem; resize: none; outline: none;
      border-radius: var(--radius); transition: border-color .2s, box-shadow .2s;
    }
    textarea:focus { border-color: var(--border-bright); box-shadow: var(--glow); }
    textarea::placeholder { color: var(--muted); }

    .cta-row { display: flex; gap: .8rem; align-items: center; margin-top: 1.2rem; flex-wrap: wrap; }
    .cta { flex: 1; min-width: 200px; background: transparent; border: 1px solid var(--accent); border-radius: var(--radius); color: var(--accent); font-family: 'Space Mono', monospace; font-size: .78rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; padding: .85rem 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: .6rem; transition: all .2s; text-shadow: var(--glow); box-shadow: var(--glow); }
    .cta:hover:not(:disabled) { background: var(--accent); color: #000; box-shadow: var(--glow-strong); text-shadow: none; }
    .cta:disabled { opacity: .3; cursor: not-allowed; }
    .cta-hint { font-size: .65rem; color: var(--muted2); }
    .spinner { width: 14px; height: 14px; border: 1.5px solid rgba(0,255,180,.3); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { background: rgba(255,59,48,.08); border: 1px solid rgba(255,59,48,.25); padding: .7rem 1rem; color: var(--red); font-size: .75rem; display: none; margin-top: .8rem; border-radius: var(--radius); }

    .disclaimer { margin-top: 1.2rem; padding: .7rem 1rem; border: 1px solid rgba(255,159,10,.15); background: rgba(255,159,10,.03); font-size: .64rem; color: var(--muted2); line-height: 1.7; border-radius: var(--radius); }
    .disclaimer strong { color: var(--warn); }

    .legend { display: grid; grid-template-columns: repeat(4, 1fr); gap: .5rem; margin-top: 1.5rem; }
    @media (max-width: 500px) { .legend { grid-template-columns: repeat(2,1fr); } }
    .legend-item { background: var(--surface); border: 1px solid var(--border); padding: .6rem .8rem; border-radius: var(--radius); }
    .legend-issue { font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: var(--red); margin-bottom: .3rem; }
    .legend-desc { font-size: .64rem; color: var(--muted2); line-height: 1.5; }

    .response-wrap { display: none; animation: fadeUp .4s ease; margin-top: 1.5rem; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .response-card { background: var(--surface); border: 1px solid var(--border); backdrop-filter: blur(12px); padding: 1.6rem; border-radius: var(--radius); box-shadow: var(--glow); }
    .response-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; padding-bottom: .8rem; border-bottom: 1px solid var(--border); }
    .response-title { font-size: .62rem; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); text-shadow: var(--glow); }
    .response-stamp { font-size: .62rem; color: var(--muted2); }
    .response-text { font-size: .82rem; line-height: 1.9; color: var(--text); white-space: pre-wrap; }
    .response-text strong { color: var(--warn); font-weight: 700; }
    .response-text em { color: var(--accent2); font-style: normal; }
    .response-actions { display: flex; gap: .5rem; margin-top: 1.2rem; padding-top: .9rem; border-top: 1px solid var(--border); }
    .act-btn { background: none; border: 1px solid var(--border); color: var(--muted2); font-family: 'Space Mono', monospace; font-size: .65rem; letter-spacing: .1em; text-transform: uppercase; padding: .38rem .8rem; cursor: pointer; transition: all .18s; border-radius: var(--radius); }
    .act-btn:hover { border-color: var(--border-bright); color: var(--text); }

    footer { margin-top: 4rem; padding-top: 1.5rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: .62rem; color: var(--muted2); flex-wrap: wrap; gap: .5rem; }
    footer a { color: var(--muted2); text-decoration: none; }
    footer a:hover { color: var(--accent); text-shadow: var(--glow); }
  </style>
</head>
<body>
<canvas id="oscCanvas"></canvas>
<div class="page">

  <nav>
    <div class="nav-left">
      <div class="nav-logo">PCB<span>RedFlag</span><span class="cursor"></span></div>
      <div class="nav-badge" id="t-badge">DFM Scanner</div>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('it')">🇮🇹 IT</button>
      <button class="lang-btn" onclick="setLang('en')">🇬🇧 EN</button>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">Oscilloscope DFM v1.0</div>
    <h1>Trova i <em>red flag</em><br>prima della produzione</h1>
    <p class="hero-sub" id="t-herosub"></p>
  </div>

  <!-- Upload -->
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('uploadInput').click()">
    <div class="upload-icon">📟</div>
    <div class="upload-label" id="t-upload-label"></div>
    <div class="upload-sub" id="t-upload-sub"></div>
    <input type="file" id="uploadInput" accept="image/*" />
  </div>

  <!-- Preview -->
  <div class="preview-zone" id="previewZone">
    <div class="preview-header">
      <span class="preview-title">// SIGNAL ACQUIRED</span>
      <button class="preview-btn" onclick="clearUpload()" id="t-clear"></button>
    </div>
    <img id="previewImg" class="preview-img" alt="PCB" />
  </div>

  <!-- PCB description -->
  <div class="field">
    <span class="field-label" id="t-describe-label"></span>
    <div class="field-prefix">// INPUT</div>
    <textarea id="pcbDescription" rows="4" id="pcbDescription"></textarea>
  </div>

  <!-- Context -->
  <div class="field">
    <span class="field-label">// CONTEXT</span>
    <textarea id="contextInput" rows="2"></textarea>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="cta-row">
    <button class="cta" id="ctaBtn" onclick="generate()">
      <div class="spinner" id="spinner"></div>
      <span id="btnText"></span>
    </button>
    <span class="cta-hint" id="t-cta-hint"></span>
  </div>

  <div class="disclaimer">
    <strong id="t-disclaimer-title"></strong><br>
    <span id="t-disclaimer-body"></span>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-issue">No fiducials</div><div class="legend-desc" id="t-l1"></div></div>
    <div class="legend-item"><div class="legend-issue">Via-in-pad</div><div class="legend-desc" id="t-l2"></div></div>
    <div class="legend-item"><div class="legend-issue">Trace spacing</div><div class="legend-desc" id="t-l3"></div></div>
    <div class="legend-item"><div class="legend-issue">Thermal vias</div><div class="legend-desc" id="t-l4"></div></div>
  </div>

  <!-- Response -->
  <div class="response-wrap" id="responseWrap">
    <div class="response-card">
      <div class="response-header">
        <span class="response-title" id="t-response-title"></span>
        <span class="response-stamp" id="responseStamp">—</span>
      </div>
      <div class="response-text" id="responseText"></div>
      <div class="response-actions">
        <button class="act-btn" onclick="copyText()" id="t-copy"></button>
        <button class="act-btn" onclick="resetForm()" id="t-reset"></button>
      </div>
    </div>
  </div>

  <footer>
    <span id="t-footer"></span>
    <span>Powered by <a href="https://gemini.google.com" target="_blank">Google Gemini</a></span>
  </footer>
</div>

<script>
const WORKER_URL = 'https://pcb-redflag.fumettiastro.workers.dev';

const S = {
  it: {
    badge: 'DFM Scanner',
    herosub: 'Carica uno screenshot del PCB o descrivilo. L\'AI trova i problemi di produzione prima che diventino costosi.',
    'upload-label': 'Carica screenshot PCB',
    'upload-sub': 'JPG o PNG — o descrivi sotto senza caricare',
    clear: 'Rimuovi',
    'describe-label': 'Descrizione PCB',
    pcb_placeholder: 'Es: 2-layer, 4x6cm, USB-C top-left, SMD 0805, trace power 2mm, no via termica, JLCPCB...',
    ctx_placeholder: 'Es: 500 unità, PCBA in Cina, primo spin, budget basso...',
    cta: '⚠ RUN SCAN',
    'cta-hint': 'Gratis · Powered by Gemini',
    'disclaimer-title': '⚠ Nota',
    'disclaimer-body': 'Questo tool analizza descrizioni testuali e immagini — non file Gerber. Nessuna misurazione precisa. Prima della produzione usa JLCDFM, HQDFM o Better DFM. Utile come prima scrematura, non come sostituto di una revisione DFM professionale.',
    l1: 'Pick-and-place misaligned, yield basso',
    l2: 'Solder wicking, tombstoning',
    l3: 'Short circuits, EMI, fab reject',
    l4: 'Hotspot → guasto in campo',
    'response-title': '// RED FLAGS DETECTED',
    copy: 'Copia',
    reset: 'Reset',
    footer: '© 2026 PCB Red Flag Scanner',
    loading: 'Scansione in corso...',
    error_empty: 'Carica un\'immagine o aggiungi una descrizione.',
    h1: 'Trova i <em>red flag</em><br>prima della produzione',
    system_prompt: `Esperto DFM/DFA PCB, produzione in serie. Analizza il PCB e lista i problemi:
🔴 Critico | 🟡 Serio | 🟢 Migliorabile
Per ognuno: 1 riga problema, 2 righe perché, 1 riga fix. Max 3 problemi per categoria. 
Niente intro, niente conclusioni. Solo i problemi. Rispondi in italiano.`
  },
  en: {
    badge: 'DFM Scanner',
    herosub: 'Upload a PCB screenshot or describe it. The AI finds manufacturability issues before they cost you money.',
    'upload-label': 'Upload PCB screenshot',
    'upload-sub': 'JPG or PNG — or just describe below',
    clear: 'Remove',
    'describe-label': 'PCB description',
    pcb_placeholder: 'E.g.: 2-layer, 4x6cm, USB-C top-left, SMD 0805, 2mm power trace, no thermal vias, JLCPCB...',
    ctx_placeholder: 'E.g.: 500 units, PCBA in China, first spin, low budget...',
    cta: '⚠ RUN SCAN',
    'cta-hint': 'Free · Powered by Gemini',
    'disclaimer-title': '⚠ Note',
    'disclaimer-body': 'This tool analyzes text descriptions and images — not Gerber files. No precise measurements. Before production, use JLCDFM, HQDFM or Better DFM. Useful as a first pass, not a replacement for professional DFM review.',
    l1: 'Pick-and-place misaligned, low yield',
    l2: 'Solder wicking, tombstoning',
    l3: 'Short circuits, EMI, fab reject',
    l4: 'Hotspot → field failure',
    'response-title': '// RED FLAGS DETECTED',
    copy: 'Copy',
    reset: 'Reset',
    footer: '© 2026 PCB Red Flag Scanner',
    loading: 'Scanning...',
    error_empty: 'Upload an image or add a description.',
    h1: 'Find <em>red flags</em><br>before production',
    system_prompt: `PCB DFM/DFA expert, mass production. Analyze the PCB and list issues:
🔴 Critical | 🟡 Serious | 🟢 Improvable
Each: 1 line problem, 2 lines why, 1 line fix. Max 3 issues per category.
No intro, no conclusions. Issues only. Reply in English.`
  }
};

let lang = 'it';
let uploadedImage = null;

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(l)));
  document.documentElement.lang = l;
  const s = S[l];
  // Update all text nodes
  const ids = ['badge','herosub','upload-label','upload-sub','clear','describe-label',
    'cta-hint','disclaimer-title','disclaimer-body','l1','l2','l3','l4',
    'response-title','copy','reset','footer'];
  ids.forEach(id => {
    const el = document.getElementById('t-' + id);
    if (el) el.textContent = s[id] || '';
  });
  // HTML fields
  document.querySelector('h1').innerHTML = s.h1;
  document.getElementById('btnText').textContent = s.cta;
  document.getElementById('pcbDescription').placeholder = s.pcb_placeholder;
  document.getElementById('contextInput').placeholder = s.ctx_placeholder;
}

// ── Oscilloscope ──
const canvas = document.getElementById('oscCanvas');
const ctx = canvas.getContext('2d');
let t = 0;
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
function drawOsc() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const w = canvas.width, h = canvas.height;
  const waves = [
    { y: h*.25, amp: 40, freq: .012, speed: .6, color: '#00ffb0', alpha: .7 },
    { y: h*.55, amp: 25, freq: .018, speed: .4, color: '#00c8ff', alpha: .5 },
    { y: h*.78, amp: 15, freq: .025, speed: .8, color: '#00ffb0', alpha: .3 },
  ];
  waves.forEach(wave => {
    ctx.beginPath(); ctx.strokeStyle = wave.color; ctx.lineWidth = 1.2;
    ctx.globalAlpha = wave.alpha; ctx.shadowBlur = 8; ctx.shadowColor = wave.color;
    for (let x = 0; x <= w; x += 2) {
      const y = wave.y + Math.sin((x * wave.freq) + t * wave.speed) * wave.amp + Math.sin((x * wave.freq * 2.3) + t * wave.speed * .7) * (wave.amp * .3);
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  });
  ctx.globalAlpha = .06; ctx.strokeStyle = '#00ffb0'; ctx.lineWidth = 1; ctx.shadowBlur = 0;
  for (let i = 0; i <= 10; i++) { ctx.beginPath(); ctx.moveTo(w/10*i,0); ctx.lineTo(w/10*i,h); ctx.stroke(); }
  for (let i = 0; i <= 8; i++) { ctx.beginPath(); ctx.moveTo(0,h/8*i); ctx.lineTo(w,h/8*i); ctx.stroke(); }
  ctx.globalAlpha = 1; t += 0.02; requestAnimationFrame(drawOsc);
}
drawOsc();

// ── Upload ──
document.getElementById('uploadInput').addEventListener('change', e => { if(e.target.files[0]) handleUpload(e.target.files[0]); });
const uploadZone = document.getElementById('uploadZone');
['dragenter','dragover','dragleave','drop'].forEach(ev => uploadZone.addEventListener(ev, e => e.preventDefault()));
uploadZone.addEventListener('drop', e => { if(e.dataTransfer.files[0]) handleUpload(e.dataTransfer.files[0]); });
uploadZone.addEventListener('dragover', () => uploadZone.classList.add('dragover'));
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));

function handleUpload(file) {
  if (!file.type.startsWith('image/')) return;
  uploadedImage = file;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('previewZone').style.display = 'block';
    uploadZone.style.display = 'none';
  };
  reader.readAsDataURL(file);
}
function clearUpload() {
  uploadedImage = null;
  document.getElementById('previewZone').style.display = 'none';
  uploadZone.style.display = 'block';
  document.getElementById('previewImg').src = '';
}

// ── Generate ──
async function generate() {
  const s = S[lang];
  const desc = document.getElementById('pcbDescription').value.trim();
  const context = document.getElementById('contextInput').value.trim();
  if (!desc && !uploadedImage) { showError(s.error_empty); return; }
  const userMessage = [desc, context ? 'Context: ' + context : ''].filter(Boolean).join('\n\n');
  setLoading(true); hideError(); document.getElementById('responseWrap').style.display = 'none';
  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userMessage, systemPrompt: s.system_prompt })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    showResponse(data.text);
  } catch(e) { showError('❌ ' + e.message); }
  finally { setLoading(false); }
}

function setLoading(on) {
  document.getElementById('ctaBtn').disabled = on;
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.getElementById('btnText').textContent = on ? S[lang].loading : S[lang].cta;
}
function showResponse(text) {
  const el = document.getElementById('responseText');
  el.innerHTML = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>');
  document.getElementById('responseStamp').textContent = new Date().toLocaleTimeString(lang==='it'?'it-IT':'en-GB',{hour:'2-digit',minute:'2-digit'});
  const wrap = document.getElementById('responseWrap');
  wrap.style.display = 'block';
  setTimeout(() => wrap.scrollIntoView({ behavior:'smooth', block:'start' }), 100);
}
function showError(m) { const e=document.getElementById('errorBox'); e.textContent=m; e.style.display='block'; }
function hideError() { document.getElementById('errorBox').style.display='none'; }
function copyText() {
  navigator.clipboard.writeText(document.getElementById('responseText').innerText).then(() => {
